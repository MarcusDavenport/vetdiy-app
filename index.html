<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VetDIY — Mobile App Preview</title>
<link rel="icon" href="./m/favicon.ico" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(1200px 800px at 50% -10%, #0d2949 0%, #071426 60%, #04101f 100%);
    color: #e8eef7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 48px;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; letter-spacing: .3px; }
  .brand .diy { color: #e23b3b; }
  .tag { color: #9db4d0; font-size: 13px; margin-top: 6px; }
  .frame-wrap { margin-top: 28px; }
  .phone {
    position: relative;
    width: 390px; height: 800px;
    background: #000;
    border-radius: 46px;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 0 0 2px #1c2c40, inset 0 0 0 2px #232f42;
  }
  .phone::before {
    content: ""; position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 26px; background: #000; border-radius: 16px; z-index: 3;
  }
  .screen { width: 100%; height: 100%; border-radius: 34px; overflow: hidden; background: #071F3D; }
  .screen iframe { width: 100%; height: 100%; border: 0; display: block; }
  .hint { margin-top: 22px; color: #7f97b5; font-size: 12.5px; text-align: center; max-width: 320px; line-height: 1.6; }
  @media (max-width: 520px) {
    body { padding: 0; }
    .brand, .tag, .hint { display: none; }
    .frame-wrap { margin: 0; width: 100%; height: 100vh; }
    .phone { width: 100vw; height: 100vh; border-radius: 0; padding: 0; box-shadow: none; }
    .phone::before { display: none; }
    .screen { border-radius: 0; }
  }
</style>
</head>
<body>
  <div class="brand">Vet<span class="diy">DIY</span></div>
  <div class="tag">Mobile app preview · running on demo data</div>
  <div class="frame-wrap">
    <div class="phone"><div class="screen"><iframe src="./m/" title="VetDIY mobile app" loading="eager"></iframe></div></div>
  </div>
  <p class="hint">This is the VetDIY mobile app rendered in the browser. Open this page on your phone to use it full-screen.</p>
</body>
</html>
